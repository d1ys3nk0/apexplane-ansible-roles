---

- name: Ensure ansible user has correct settings and password
  become: true
  ansible.builtin.user:
    name: '{{ base_users_ansible_user }}'
    password: >-
      {{ (base_users_master_pass | string | length > 0 and base_users_master_salt | string | length > 0) |
      ternary(base_users_master_pass | password_hash(hashtype='sha512', salt=base_users_master_salt), omit) }}
    shell: /bin/bash
  no_log: '{{ base_users_nolog }}'

- name: Update .bashrc for {{ base_users_ansible_user }}
  become: true
  ansible.builtin.copy:
    src: skel/bashrc.sh
    dest: /home/{{ base_users_ansible_user }}/.bashrc
    owner: '{{ base_users_ansible_user }}'
    group: '{{ base_users_ansible_user }}'
    mode: '0644'

- name: Grant sudo access without password to ansible user
  become: true
  ansible.builtin.copy:
    content: "{{ base_users_ansible_user }} ALL=(ALL:ALL) NOPASSWD:ALL\n"
    dest: /etc/sudoers.d/{{ base_users_ansible_user }}
    owner: root
    group: root
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s

